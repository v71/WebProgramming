<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 400px;
      margin: 60px auto;
      padding: 20px;
    }
    form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    input, button {
      padding: 10px;
      font-size: 16px;
    }
    button {
      background: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background: #45a049;
    }
    #message {
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>

<body>

        <h2>Admin Registration</h2>
        <form id="loginForm">
          <input type="email" id="email" placeholder="Email" required />
          <input type="password" id="password" placeholder="Password" required />
          <button type="submit">Login</button>
        </form>
        <div id="message"></div>

        </script>

        <script type="module">

          import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

          // Supabase credentials
          const SUPABASE_URL = "https://bjbnkqgyibadjlrcjqfs.supabase.co";
          const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJqYm5rcWd5aWJhZGpscmNqcWZzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ2ODkyOTksImV4cCI6MjA4MDI2NTI5OX0.sFqboExgH7E3o51COcAGGn2Tz5mO75ccUn3IKJIf-w8";

          const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

          const form = document.getElementById("loginForm");
          const msg = document.getElementById("message");

          // Fill test admin
          function fillTestUser() {
            document.getElementById("email").value = "mjwpan71@gmail.com";
            document.getElementById("password").value = "ciao1234";
            msg.textContent = `🧪 Loaded Test Admin`;
          }

          document.addEventListener("DOMContentLoaded", () => {
            fillTestUser();
          });

          // Login form submit
          form.addEventListener("submit", async (e) => {
            e.preventDefault();
            msg.textContent = "";

            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;

            if (!email || !password) {
              msg.textContent = "❌ Fill all fields.";
              return;
            }

            // 1️⃣ Sign in
            const { data: loginData, error: loginError } = await client.auth.signInWithPassword({
              email,
              password
            });

            if (loginError) {
              msg.textContent = "❌ " + loginError.message;
              return;
            }

            // 2️⃣ Check session
            const { data: sessionData } = await client.auth.getSession();
            if (!sessionData.session) {
              msg.textContent = "❌ Failed to establish session";
              return;
            }

            const uid = sessionData.session.user.id;
            console.log("Logged-in UID:", uid);

            // 3️⃣ Check if user is actually an admin
            const { data: adminRows, error: adminError } = await client
              .from('Admins')
              .select('id')
              .eq('id', uid)
              .single();

            if (adminError || !adminRows) {
              msg.textContent = "❌ You are not authorized as admin.";
              return;
            }

            msg.textContent = "✅ Login successful! Redirecting...";
            
            // 4️⃣ Redirect to clinicians list page
            setTimeout(() => {
              window.location.href = "clinicians.html"; // your clinicians page
            }, 1000);
          });

      </script>

</body>
</html>
