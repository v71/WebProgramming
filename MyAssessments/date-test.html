        // --- PARAMETRI DI TEST ---

        // Questa terapia è finita ieri (2 Giugno), quindi deve risultare PASSATA.

        // NUMERIC STATE "CLASS" (ENUM) ---
        const TherapyState = Object.freeze({
            NOT_YET_STARTED: 0,
            ON_COURSE:       1,
            PAST_DUE_TIME:   4
        });

        const lastTherapy = {
            dataInizio: "2026-06-01",
            dataFine: "2026-06-02", 
            stato: null
        };

        // --- AUTOMATIC RUNTIME EXECUTION ---
        (function runAutomaticAnalysis() {
            
            const totalDays = getDaysBetween(lastTherapy.dataInizio, lastTherapy.dataFine) + 1; 
            const currentday = getDaysSince(lastTherapy.dataInizio); 
            const leftDays = totalDays - currentday;
            const rawPercent = Math.floor((currentday * 100) / totalDays);
            const giorniPercentuale = Math.max(0, Math.min(100, rawPercent));
            const ratioTrascorsi = Math.max(0, Math.min(totalDays, currentday));
            
            let posizioneCorrente=-1;

            let report = [];
            report.push(`[SISTEMA] Oggi rilevato: ${new Date().toLocaleDateString('it-IT')}\n`);
            report.push(`[PARAMETRI TERAPIA]:`);
            report.push(`↳ Data Inizio: ${lastTherapy.dataInizio}`);
            report.push(`↳ Data Fine:   ${lastTherapy.dataFine}\n`);
            report.push(`--------------------------------------------`);
            report.push(`1. Giorni Totali Durata (Inclusivi):     ${totalDays} giorni`);
            report.push(`2. Giorni Trascorsi dall'inizio ad oggi: ${currentday} giorni`);
            report.push(`3. Giorni Rimanenti (Incluso oggi):      ${leftDays} giorni`);
            report.push(`--------------------------------------------`);
            
            report.push(`\n[STATO SCADENZA DATA FINE]:`);
            
            if ( posizioneCorrente===-1)
            {
              lastTherapy.stato=TherapyState.NOT_YET_STARTED;
            }
        
            // 🌟 MODIFICATO: Condizioni aggiornate basate sulla matematica inclusiva
            if (leftDays > 1) {
              //  report.push(`↳ Stato: FUTURO (${leftDays} giorni rimasti inclusi oggi).`);

            } 
            else if (leftDays === 1) {
                // Se rimane solo 1 giorno, significa che OGGI è l'ultimo giorno utile!
            //    report.push(`↳ Stato: OGGI (Ultimo giorno utile per completare la terapia).`);
            //    lastTherapy.stato=TherapyState.ON_COURSE;
            } 
            else {
                // Se leftDays è 0 o negativo, la data di fine è passata
                // Math.abs(leftDays) + 1 calcola esattamente da quanti giorni è terminata
                const giorniDaScadenza = Math.abs(leftDays) + 1;
          //      report.push(`↳ Stato: PASSATO (Terminata da ${giorniDaScadenza} giorni).`);
            //    lastTherapy.stato=TherapyState.PAST_DUE_TIME;
            }

            const stringStateName = Object.keys(TherapyState).find(key => TherapyState[key] === lastTherapy.stato);
            const giorniRatioString = `${ratioTrascorsi} / ${totalDays} giorni`;
            report.push(`↳ Stato: ${stringStateName}`);
            report.push(`\n[STATISTICHE DI AVANZAMENTO]:`);
            report.push(`↳ Ratio Giorni Trascorsi: ${giorniRatioString}`);
            report.push(`↳ Progressione Grafica:   ${giorniPercentuale}%`);
   
            report.push(`\n[POSIZIONI]:`);
            report.push(`↳ Posizione Corrente: ${posizioneCorrente}`);

            document.getElementById('consoleOutput').innerText = report.join("\n");
