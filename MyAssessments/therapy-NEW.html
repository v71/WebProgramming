        <script>

            // A global tracker variable to protect against aggressive database render loops
            let isAvatarStateLocked = false;

            function updateUserAvatar(userGender) {
                // If the loop tries to run a second time, immediately reject it to save performance
                if (isAvatarStateLocked) return;
                
                const avatarImg1 = document.getElementById('profileAvatar1');
                const spinnerIcon1 = document.getElementById('avatarSpinnerIcon1');
                const container1 = document.getElementById('avatarContainer1');

                if (!avatarImg1 || !spinnerIcon1) return;

                // 1. Process and sanitize input values
                let targetSrc  = 'assets/sb-admin-2/img/undraw_profile.svg';
                let targetSrc1 = 'assets/sb-admin-2/img/undraw_profile.svg';

                if (userGender === 'Femminile') {
                    targetSrc  = 'assets/img/registrazione/terapeuta-female.png';
                    targetSrc1 = 'assets/img/registrazione/terapeuta-female.png';

                } else if (userGender === 'Maschile') {
                    targetSrc  = 'assets/img/registrazione/terapeuta-male.png';
                    targetSrc1 = 'assets/img/registrazione/terapeuta-male.png';
                }

                // 2. Assign source asset
                avatarImg1.src = targetSrc1;

                // 3. Clear placeholder settings and render image node
                spinnerIcon1.classList.add('d-none');     // Permanently hide the spinner element
                avatarImg1.classList.remove('d-none');   // Force show the newly assigned image layout
                
                if (container1) {
                    container1.classList.remove('bg-light', 'p-1'); // Clean up temporary loading borders
                }
                
                // 4. Lock down state so external asynchronous loops cannot re-enable the loading indicators
                isAvatarStateLocked = true;
            }
        
        </script>
