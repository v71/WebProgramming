    <script>

function calculateMedian(agesArray) {
    if (agesArray.length === 0) return "-";
    const sorted = [...agesArray].sort((a, b) => a - b);
    const mid = Math.floor(sorted.length / 2);
    return sorted.length % 2 !== 0 
        ? sorted[mid] 
        : Math.round((sorted[mid - 1] + sorted[mid]) / 2);
}

function calculateAverage(agesArray) {
    if (agesArray.length === 0) return "-";
    const sum = agesArray.reduce((acc, age) => acc + age, 0);
    return (sum / agesArray.length).toFixed(1);
}

function updatePatientStatsCard() {
    const dataset = window.patients;
    if (!dataset || dataset.length === 0) return;

    let males = [];
    let females = [];
    
    // Histogram Bracket Counters
    let b0_5 = 0;
    let b6_10 = 0;
    let b11_15 = 0;
    let b16_up = 0;

    dataset.forEach(p => {
        const gender = p.genere ? p.genere.toLowerCase().trim() : '';
        const age = parseInt(p.eta);
        
        if (isNaN(age)) return;

        // Sort Gender Arrays
        if (gender === 'maschile') {
            males.push(age);
        } else if (gender === 'femminile') {
            females.push(age);
        }

        // Sort Histogram Brackets
        if (age <= 5) b0_5++;
        else if (age <= 10) b6_10++;
        else if (age <= 15) b11_15++;
        else b16_up++;
    });

    const totalCount = males.length + females.length;
    if (totalCount === 0) return;

    // Gender Percentages
    const malePct = Math.round((males.length / totalCount) * 100);
    const femalePct = 100 - malePct; 

    // Update Demographic Text Elements
    document.getElementById('male-count-label').innerText = `${males.length} (${malePct}%)`;
    document.getElementById('male-median-label').innerText = `${calculateMedian(males)} anni`;
    document.getElementById('male-avg-label').innerText = `${calculateAverage(males)} anni`;

    document.getElementById('female-count-label').innerText = `${females.length} (${femalePct}%)`;
    document.getElementById('female-median-label').innerText = `${calculateMedian(females)} anni`;
    document.getElementById('female-avg-label').innerText = `${calculateAverage(females)} anni`;

    // Render Pie Chart
    const pieChart = document.getElementById('stats-pie-chart');
    if (pieChart) {
        pieChart.style.background = `conic-gradient(#3b82f6 0% ${malePct}%, #ec4899 ${malePct}% 100%)`;
    }

    // --- RENDER HISTOGRAM BARS ---
    // Calculate the percentage relative width each bracket occupies in the layout framework
    const pct0_5 = Math.round((b0_5 / totalCount) * 100);
    const pct6_10 = Math.round((b6_10 / totalCount) * 100);
    const pct11_15 = Math.round((b11_15 / totalCount) * 100);
    const pct16_up = Math.round((b16_up / totalCount) * 100);

    // Update Counter Numeric Displays
    document.getElementById('label-0-5').innerText = b0_5;
    document.getElementById('label-6-10').innerText = b6_10;
    document.getElementById('label-11-15').innerText = b11_15;
    document.getElementById('label-16-up').innerText = b16_up;

    // Animate widths
    document.getElementById('bar-0-5').style.width = `${pct0_5}%`;
    document.getElementById('bar-6-10').style.width = `${pct6_10}%`;
    document.getElementById('bar-11-15').style.width = `${pct11_15}%`;
    document.getElementById('bar-16-up').style.width = `${pct16_up}%`;
}
