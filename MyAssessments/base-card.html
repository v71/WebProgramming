    <script>
        let isAvatarStateLocked = false;

        function updateUserAvatar(userGender) {
            if (isAvatarStateLocked) return;
            
            const avatarImg1 = document.getElementById('profileAvatar1');
            const spinnerIcon1 = document.getElementById('avatarSpinnerIcon1');
            const container1 = document.getElementById('avatarContainer1');

            if (!avatarImg1 || !spinnerIcon1) return;

            let targetSrc1 = 'assets/sb-admin-2/img/undraw_profile.svg';

            if (userGender === 'Femminile') {
                targetSrc1 = 'assets/img/registrazione/terapeuta-female.png';
            } else if (userGender === 'Maschile') {
                targetSrc1 = 'assets/img/registrazione/terapeuta-male.png';
            }

            avatarImg1.src = targetSrc1;
            spinnerIcon1.classList.add('d-none');
            avatarImg1.classList.remove('d-none');
            
            if (container1) {
                container1.classList.remove('bg-light', 'p-1');
            }
            isAvatarStateLocked = true;
        }
    </script>
