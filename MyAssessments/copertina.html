<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Incel-8671 - Copertina CRT</title>
    <style>
        /* Reset e Font monospazio stile Terminale */
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=VT323&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #030a05;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'VT323', 'Courier New', monospace;
        }

        /* Il Monitor CRT */
        .terminal-screen {
            position: relative;
            width: 90vw;
            max-width: 500px;
            height: 95vh;
            max-height: 750px;
            background: radial-gradient(circle, #0a2f1d 0%, #03140b 100%);
            border: 20px solid #1a1a1a;
            border-radius: 30px;
            box-shadow: 0 0 50px rgba(0, 255, 102, 0.15), inset 0 0 40px rgba(0, 0, 0, 0.8);
            padding: 40px;
            box-sizing: border-box;
            color: #33ff66;
            text-shadow: 0 0 8px rgba(51, 255, 102, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
            
            /* Curvatura simulata del vetro dello schermo */
            animation: flicker 0.15s infinite;
        }

        /* Righe di scansione CRT orizzontali ben visibili */
        .terminal-screen::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.45) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 10;
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
        }

        /* Bombatura angoli per effetto tubo catodico */
        .terminal-screen::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: radial-gradient(circle, rgba(0,0,0,0) 60%, rgba(0,0,0,0.7) 100%);
            z-index: 11;
            pointer-events: none;
        }

        /* Metadati del sistema burocratico */
        .sys-header {
            font-size: 1.2rem;
            letter-spacing: 2px;
            border-bottom: 2px solid #33ff66;
            padding-bottom: 10px;
            opacity: 0.8;
        }

        /* Il Titolo Principale in Fixedsize font gigante */
        .main-title-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .title-code {
            font-size: 5.0rem;
            font-weight: bold;
            line-height: 1;
            letter-spacing: 4px;
            margin: 0;
            text-transform: uppercase;
        }

        /* Il Sottotitolo */
        .subtitle {
            font-family: 'Courier Prime', monospace;
            font-size: 1.1rem;
            letter-spacing: 1px;
            margin-top: 30px;
            border: 1px solid #33ff66;
            padding: 8px 15px;
            background: rgba(51, 255, 102, 0.05);
            text-transform: lowercase;
        }

        /* Stringa di comando in fondo allo schermo */
        .sys-footer {
            font-size: 1.3rem;
            font-family: monospace;
            display: flex;
            align-items: center;
        }

        .cursor {
            width: 12px;
            height: 20px;
            background-color: #33ff66;
            margin-left: 8px;
            animation: blink 0.8s infinite;
            box-shadow: 0 0 8px rgba(51, 255, 102, 0.8);
        }

        /* Animazioni per simulare l'hardware anni '80 */
        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }

        @keyframes flicker {
            0% { opacity: 0.985; }
            50% { opacity: 0.995; }
            100% { opacity: 0.985; }
        }
    </style>
</head>
<body>

    <div class="terminal-screen">
        <div class="main-title-container">
            <h1 class="title-code">INCEL-8671</h1>
            <div class="subtitle">"cronache di un futuro possibile"</div>
        </div>
    </div>

</body>
</html>
