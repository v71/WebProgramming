    <style>

        /* Ensure the card can act as a container for absolute positioning */
        .card-grid-container .card {
            position: relative; /* <-- CRUCIAL */
        }

        /* The style for the large, large, overlay checkmark */
        .selection-overlay-icon {
            display: none; /* Hide by default */
            position: absolute;
            top: 15px; /* Adjust as needed */
            right: 15px; /* Adjust as needed */
            font-size: 30px; /* Make it nice and large! */
            color: #ffffff; /* Bootstrap Green */
            background-color: rgb(0,200,0); /* White background for visibility */
            border-radius: 50%; /* Make the background round */
            width: 50px; /* Container size */
            height: 50px; /* Container size */
            display: flex; /* Centers the icon */
            align-items: center; /* Centers the icon */
            justify-content: center; /* Centers the icon */
            z-index: 10; /* Ensure it stays above everything, including hover states */
            opacity: 0; /* Smooth transition start */
            transition: all 0.2s ease; /* Smooth fade in/out */
        }

        /* Only show the checkmark WHEN THE CARD IS SELECTED */
        .card.selected .selection-overlay-icon {
            display: flex; /* Reveal */
            opacity: 1; /* Fade in */
        }

        /* Ensure that when the checkmark is present, hover interactions on the 
        CHECKMARK itself don't trigger unwanted behavior */
        .selection-overlay-icon:hover {
            pointer-events: none; 
        }

        /* The card should NOT have a blue border by default */
        .card {
            transition: all 0.2s ease;
            border: 2px solid transparent !important; /* Keep transparent */
        }

        /* Ensure the overlay icon shows up */
        .card.selected .selection-overlay-icon {
            display: flex;
            opacity: 1;
        }

    </style>

    <style>

    <style>

        /* 1. Track Container Sizing Controls */
        .sb-horizontal-scroll-container {
            display: flex;
            flex-direction: row;
            overflow-x: auto;
            overflow-y: hidden;
            white-space: nowrap;
            padding: 15px 5px;
            gap: 16px;
            -webkit-overflow-scrolling: touch; /* Momentum scrolling fallback for iOS */
        }

        /* Scrollbar customization matches SB Admin palette */
        .sb-horizontal-scroll-container::-webkit-scrollbar {
            height: 6px;
        }
        .sb-horizontal-scroll-container::-webkit-scrollbar-track {
            background: #f1f3f9;
            border-radius: 4px;
        }
        .sb-horizontal-scroll-container::-webkit-scrollbar-thumb {
            background: #dddfeb;
            border-radius: 4px;
        }

        /* 2. Card Wrapper Setup */
        .sb-draggable-item {
            flex-shrink: 0; 
            width: 270px;
            user-select: none;
            -webkit-user-select: none; 
            /* Let standard touch actions work on the card body so swipes scroll the list smoothly */
            touch-action: pan-x pan-y; 
        }

        /* 3. The Isolated Mobile Drag Grip Handle */
        .drag-handle {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f8f9fc;
            border-bottom: 1px solid #e3e6f0;
            padding: 8px 0;
            cursor: move;
            cursor: -webkit-grabbing;
            color: #b7b9cc;
            /* CRUCIAL: Tell the mobile browser that touching this handle IMMEDIATELY passes control to JS */
            touch-action: none; 
        }
        .drag-handle:hover {
            background-color: #eaecf4;
            color: #4e73df;
        }

        /* Kill native animations explicitly while sorting states are active */
        .sb-draggable-item.sb-sortable-chosen,
        .sb-draggable-item.sb-sortable-ghost,
        .sb-draggable-item:active {
            transition: none !important;
            -webkit-transition: none !important;
        }

        /* 4. Dynamic SortableJS Target Identifiers */
        .sb-sortable-ghost {
            opacity: 0.3;
            border: 2px dashed #4e73df !important;
            background-color: #f8f9fc !important;
        }

        .sb-sortable-chosen {
            transform: scale(1.01);
        }

        .sb-sortable-fallback {
            opacity: 0.95;
            box-shadow: 0 1rem 2rem rgba(0, 0, 0, 0.15) !important;
        }

        /* Define the colors for the border-left utilities */
        .border-left-primary { border-left: .25rem solid #4e73df !important; }
        .border-left-success { border-left: .25rem solid #1cc88a !important; }
        .border-left-warning { border-left: .25rem solid #f6c23e !important; }
        .border-left-danger  { border-left: .25rem solid #e74a3b !important; }
        .border-left-info    { border-left: .25rem solid #36b9cc !important; }

    </style>

            const addBtn = card.querySelector('.add-btn');
            if (addBtn) {
                addBtn.classList.remove('btn-muted');
                addBtn.style.pointerEvents = 'auto';
                addBtn.style.opacity = '1';
                addBtn.innerHTML = '<i class="fas fa-plus-circle text-success"></i> Aggiungi';
            }

            // Mute Grid Trash button
            const gridTrashBtn = card.querySelector('.trash-btn');
            if (gridTrashBtn) {
                gridTrashBtn.classList.add('btn-muted');
            }
        }
    });

    // 4. Update the Header LAST
    // By calling this last, the list re-renders once, 
    // without the grid being manipulated immediately before or after.
    updateSelectionHeader();
    
}

</script>
