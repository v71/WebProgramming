<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact / Feedback</title>
<style>
body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; }
h2 { margin-bottom: 20px; }
input, textarea, select { width: 100%; padding: 10px; margin-top: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 6px; }
button { padding: 12px; border: none; background: #333; color: white; border-radius: 6px; cursor: pointer; width: 100%; font-size: 16px; }
button:disabled { background: #888; cursor: not-allowed; }
#status { margin-top: 15px; font-weight: bold; }
</style>
</head>
<body>

<h2>Contact / Feedback</h2>

<form id="contact-form" action="https://formspree.io/f/xeepldwj" method="POST">
  <label>Email</label>
  <input type="email" name="email" required placeholder="your@email.com">

  <label>Type</label>
  <select name="type">
    <option value="feedback">Feedback</option>
    <option value="bug">Bug Report</option>
    <option value="support">Support Request</option>
  </select>

  <label>Message</label>
  <textarea name="message" rows="6" required placeholder="Write your message..."></textarea>

  <!-- Hidden anti-spam field -->
  <input type="text" name="_gotcha" style="display:none">

  <!-- Optional: custom subject -->
  <input type="hidden" name="_subject" value="Website Contact Form">

  <button type="submit" id="submit-btn">Send Message</button>
</form>

<p id="status"></p>

<script>
const form = document.getElementById("contact-form");
const status = document.getElementById("status");
const button = document.getElementById("submit-btn");

form.addEventListener("submit", async function(e) {
  e.preventDefault();
  button.disabled = true;
  button.innerText = "Sending...";
  status.innerText = "";

  const formData = new FormData(form);

  try {
    const response = await fetch(form.action, {
      method: "POST",
      body: formData,
      headers: { 'Accept': 'application/json' }
    });

    if (response.ok) {
      status.innerText = "✅ Message sent successfully!";
      form.reset();
    } else {
      const data = await response.json();
      status.innerText = data?.error || "❌ Failed to send message.";
    }
  } catch (err) {
    console.error(err);
    status.innerText = "❌ Error sending message.";
  }

  button.disabled = false;
  button.innerText = "Send Message";
});
</script>

</body>
</html>
