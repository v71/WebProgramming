<!DOCTYPE html>

<style>
body { font-family: Arial; max-width: 500px; margin: auto; padding: 20px; }
form { display: flex; flex-direction: column; gap: 10px; }
input, button { padding: 10px; font-size: 16px; }

<body>


    <h2>Admin Registration</h2>
    <form id="registrationForm">
      <input type="text" id="name" placeholder="First Name" required />
      <input type="text" id="surname" placeholder="Surname" required />
      <input type="email" id="email" placeholder="Email" required />
      <input type="password" id="password" placeholder="Password" required />
      <input type="date" id="birth_date" placeholder="Birth Date" required />
      <button type="submit">Register</button>
    </form>

    <div id="message"></div>

   <script type="module">
       
        // ✅ Safe: DOM is fully parsed here
        document.addEventListener("DOMContentLoaded", () => {

          document.getElementById("message").textContent =`🧪 Loaded Admin`;
        }
        
        import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

        import {

          // ✅ supabase credentials

        const form = document.getElementById("registrationForm");

        form.addEventListener("submit", async (e) => {
          e.preventDefault();
          msg.textContent = "";

          const name = document.getElementById("name").value.trim();
          const surname = document.getElementById("surname").value.trim();
          const email = document.getElementById("email").value.trim();
          const password = document.getElementById("password").value;
          const creationDate = new Date().toISOString();
          const birthDate = document.getElementById("birth_date").value;

          // Validate inputs
          if (!name || !surname || !email || !password || !birthDate) {
            msg.textContent = "❌ Fill all fields and give consent.";

          }

         const { signUpData, error } = await supabase.auth.signUp({
                  email,
                  password,
                  options: {

                    data: {
                      name: normalizeItalianName(name),

                      birth_date:birthDate

                  }
                });

                console.log("SIGNUP ERROR:", error);
